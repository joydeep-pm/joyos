# Task Management System Configuration
# Copy to config.yaml and customize for your Director-of-Products workflow

# Task categories
categories:
  - technical      # Engineering dependencies, tooling, implementation gaps
  - outreach       # Client/stakeholder follow-ups, escalation communication, sales asks
  - research       # Discovery, analysis, investigation, competitive work
  - writing        # PRDs, user stories, leadership updates, summaries
  - admin          # Scheduling, approvals, operational coordination
  - people         # 1:1 prep, coaching notes, team development
  - other          # Miscellaneous

# Priority levels
priorities:
  - P0  # Critical / director attention now
  - P1  # Important this week
  - P2  # Scheduled work
  - P3  # Someday / maybe

# Status codes
statuses:
  n: not_started
  s: started
  b: blocked
  d: done

# Deduplication settings
deduplication:
  similarity_threshold: 0.6
  check_categories: true
  check_keywords: true

# Priority limits (warning thresholds)
priority_limits:
  P0: 3
  P1: 7

# Task aging (in days)
task_aging:
  prune_completed_after: 30
  flag_stale_after: 7

# Category keywords for auto-categorization
category_keywords:
  technical:
    - bug
    - blocker
    - dependency
    - engineering
    - implementation
    - api
    - integration
    - fix
    - scope
  outreach:
    - client
    - stakeholder
    - follow-up
    - escalation
    - email
    - call
    - meeting
    - sales
    - leadership
  research:
    - analyze
    - research
    - investigate
    - evaluate
    - compare
    - understand
    - validate
    - explore
  writing:
    - prd
    - story
    - draft
    - write
    - document
    - update
    - summary
    - roadmap
    - review
  admin:
    - schedule
    - organize
    - approve
    - coordinate
    - calendar
    - plan
  people:
    - 1:1
    - coaching
    - feedback
    - team
    - support
    - manager

# Operating-goal guidance
operating_goals:
  - Documentation
  - Stability
  - New Business
  - Team Leadership

# Daily planning defaults
daily_planning:
  max_focus_items: 3
  prefer_intervention_brief: true
  reduce_focus_on_meeting_heavy_days: true
